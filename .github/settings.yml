# Repository Settings - Managed by https://github.com/apps/settings
# Install the app and changes to this file will be synced to GitHub

# =============================================================================
# REPOSITORY SETTINGS
# =============================================================================
repository:
  # Repository name (changing this will rename the repository)
  name: slidev-decks-simplon

  # Short description shown on GitHub
  description: A ready-to-use GitHub repository template with linting, git hooks, and automatic dependency management.

  # Homepage URL
  homepage: https://maxime-lenne.fr

  # Topics (comma-separated)
  topics: template, github

  # Visibility
  private: false

  # Features
  has_issues: true
  has_projects: true
  has_wiki: false
  has_downloads: true

  # Default branch
  default_branch: main

  # Merge settings
  allow_squash_merge: true
  allow_merge_commit: true
  allow_rebase_merge: true
  delete_branch_on_merge: true

  # Security
  enable_automated_security_fixes: true
  enable_vulnerability_alerts: true

# =============================================================================
# LABELS
# =============================================================================
labels:
  # Type labels
  - name: bug
    color: d73a4a
    description: Something isn't working

  - name: feature
    color: a2eeef
    description: New feature or request

  - name: enhancement
    color: 84b6eb
    description: Improvement to existing feature

  - name: documentation
    color: 0075ca
    description: Improvements or additions to documentation

  - name: refactor
    color: fbca04
    description: Code refactoring without behavior change

  - name: test
    color: bfd4f2
    description: Related to testing

  # Priority labels
  - name: priority:critical
    color: b60205
    description: Must be fixed ASAP

  - name: priority:high
    color: d93f0b
    description: High priority

  - name: priority:medium
    color: fbca04
    description: Medium priority

  - name: priority:low
    color: 0e8a16
    description: Low priority

  # Status labels
  - name: status:blocked
    color: d73a4a
    description: Blocked by another issue or external factor

  - name: status:in-progress
    color: fbca04
    description: Currently being worked on

  - name: status:needs-review
    color: 0e8a16
    description: Ready for review

  - name: status:needs-info
    color: d876e3
    description: Needs more information

  # Effort labels
  - name: effort:small
    color: c5def5
    description: Small effort (< 1 day)

  - name: effort:medium
    color: bfd4f2
    description: Medium effort (1-3 days)

  - name: effort:large
    color: 7057ff
    description: Large effort (> 3 days)

  # Other labels
  - name: good first issue
    color: 7057ff
    description: Good for newcomers

  - name: help wanted
    color: 008672
    description: Extra attention is needed

  - name: wontfix
    color: ffffff
    description: This will not be worked on

  - name: duplicate
    color: cfd3d7
    description: This issue or pull request already exists

  - name: invalid
    color: e4e669
    description: This doesn't seem right

# =============================================================================
# BRANCH PROTECTION
# =============================================================================
branches:
  - name: main
    protection:
      # Require pull request reviews before merging
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
        dismissal_restrictions:
          users: []
          teams: []

      # Require status checks to pass before merging
      required_status_checks:
        strict: true
        contexts:
          - Markdown Lint
          - YAML Lint

      # Enforce rules for admins too
      enforce_admins: false

      # Require linear history (no merge commits)
      required_linear_history: false

      # Restrict who can push (set to null to allow anyone with write access)
      restrictions: null

